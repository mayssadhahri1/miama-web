<div class="container d-flex align-items-center justify-content-center" style="min-height: 85vh;">
  <div class="card auth-card p-4 p-md-5 w-100 shadow-lg border-0" style="max-width: 450px; border-radius: 20px;">
    
    <div class="text-center mb-4">
      <div class="display-5 mb-2">🍕</div>
      <h1 class="h3 fw-bold" style="color: #d35400;">Bon retour !</h1>
      <p class="text-muted">Connectez-vous pour cuisiner vos favoris.</p>
    </div>

    <div class="mb-3">
      <label class="form-label fw-semibold text-secondary">Email</label>
      <div class="input-group">
        <span class="input-group-text bg-white border-end-0 text-muted">&#64;</span>
        <input [(ngModel)]="credentials.email" type="email" 
               class="form-control border-start-0 ps-0" placeholder="chef@miam.com">
      </div>
    </div>

    <div class="mb-4">
      <label class="form-label fw-semibold text-secondary">Mot de passe</label>
      <div class="input-group">
        <span class="input-group-text bg-white border-end-0 text-muted">🔒</span>
        <input [(ngModel)]="credentials.password" type="password" 
               class="form-control border-start-0 ps-0" placeholder="••••••••">
      </div>
    </div>

    <button (click)="login()" class="btn btn-lg w-100 fw-bold text-white shadow-sm" 
            style="background: linear-gradient(45deg, #ff7e5f, #feb47b); border: none; border-radius: 12px; transition: 0.3s;">
      Se connecter
    </button>

    <div class="text-center mt-4">
      <p class="mb-0 text-muted small">Nouveau sur MiamApp ? 
        <a routerLink="/register" class="text-decoration-none fw-bold" style="color: #ff7e5f;">Créer un compte</a>
      </p>
    </div>
    
  </div>
</div>

<div class="container d-flex align-items-center justify-content-center" style="min-height: 85vh;">
  <div class="card auth-card p-4 p-md-5 w-100 shadow-lg border-0" style="max-width: 480px; border-radius: 20px;">
    
    <div class="text-center mb-4">
      <div class="display-5 mb-2">🥗</div>
      <h1 class="h3 fw-bold" style="color: #27ae60;">Devenir Chef</h1>
      <p class="text-muted">Rejoignez notre communauté gourmande.</p>
    </div>

    <div class="mb-3">
      <label class="form-label fw-semibold text-secondary">Nom d'utilisateur</label>
      <div class="input-group">
        <span class="input-group-text bg-white border-end-0 text-muted">👤</span>
        <input [(ngModel)]="user.username" type="text" class="form-control border-start-0 ps-0" placeholder="Votre nom">
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label fw-semibold text-secondary">Email</label>
      <div class="input-group">
        <span class="input-group-text bg-white border-end-0 text-muted">&#64;</span>
        <input [(ngModel)]="user.email" type="email" class="form-control border-start-0 ps-0" placeholder="email@exemple.com">
      </div>
    </div>

    <div class="mb-4">
      <label class="form-label fw-semibold text-secondary">Mot de passe</label>
      <div class="input-group">
        <span class="input-group-text bg-white border-end-0 text-muted">🔑</span>
        <input [(ngModel)]="user.password" type="password" class="form-control border-start-0 ps-0" placeholder="••••••••">
      </div>
    </div>

    <button (click)="register()" class="btn btn-lg w-100 fw-bold text-white shadow-sm" 
            style="background: linear-gradient(45deg, #2ecc71, #27ae60); border: none; border-radius: 12px; transition: 0.3s;">
      Créer mon compte
    </button>

    <div class="text-center mt-4">
      <p class="mb-0 text-muted small">Déjà inscrit ? 
        <a routerLink="/login" class="text-decoration-none fw-bold" style="color: #2ecc71;">Connectez-vous</a>
      </p>
    </div>
  </div>
</div>
